services:
  - type: web
    name: portfolio-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: UseSqlite
        value: false
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: CorsOrigins__0
        value: https://portfolio-client.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: portfolio-client
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.client
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-api.onrender.com
    autoDeploy: true

  - type: pserv
    name: portfolio-db
    plan: free
    databaseName: portfolio
    ipAllowList: []
    postgresMajorVersion: 16
